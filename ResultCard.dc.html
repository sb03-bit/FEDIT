<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,600..900;1,600..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
</helmet>

<div style="width:100%;max-width:400px;margin:0 auto;font-family:'Pretendard',sans-serif;border-radius:28px;background:linear-gradient(160deg,{{ c.ov }}),{{ c.bg }};backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.65);box-shadow:inset 0 1px 0 rgba(255,255,255,.75);padding:24px 22px 26px;position:relative;overflow:hidden;letter-spacing:.01em;">
    <div style="position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <img src="fedit_logo.png" alt="FEDIT" style="height:22px;width:auto;display:block;filter:{{ c.logoTop }};opacity:.85;"/>
        <span style="font-family:'Archivo',sans-serif;font-weight:800;font-size:13px;letter-spacing:.06em;color:{{ c.typeCol }};white-space:nowrap;">TYPE {{ c.typeNum }} / 04</span>
      </div>

      <!-- inner hero card -->
      <div style="margin-top:30px;background:linear-gradient({{ c.innerW }},{{ c.innerW }}),linear-gradient(150deg,{{ c.hov }});border-radius:26px;padding:22px 18px 22px;backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);box-shadow:inset 0 0 34px rgba(255,255,255,.22),0 10px 24px rgba(80,60,30,.1);overflow:hidden;">
        <!-- text -->
        <div style="text-align:center;">
          <div style="font-size:11px;font-weight:800;color:{{ c.nameColor }};letter-spacing:.06em;margin-top:9px;">{{ c.code }}</div>
          <div style="display:inline-block;font-size:32px;font-weight:800;color:{{ c.nameColor }};line-height:1.1;margin-top:5px;background:linear-gradient(transparent 60%,{{ c.nameHi }} 60%);padding:0 6px;">{{ c.name }}</div>
          <div style="font-size:13px;font-weight:600;color:{{ c.nameColor }};margin-top:8px;">{{ c.title }} · {{ c.krTag }}</div>
        </div>

        <!-- character hero -->
        <div style="position:relative;min-height:340px;display:flex;align-items:flex-end;justify-content:center;margin-top:4px;">
          <div style="position:absolute;inset:0;background:{{ c.glow }};pointer-events:none;"></div>
          <sc-if value="{{ c.img }}" hint-placeholder-val="{{ false }}">
            <img src="{{ c.img }}" alt="{{ c.name }}" style="position:relative;height:420px;width:auto;object-fit:contain;filter:{{ c.imgFilter }};"/>
          </sc-if>
          <sc-if value="{{ c.noImg }}" hint-placeholder-val="{{ true }}">
            <div style="position:relative;font-size:210px;line-height:1;filter:drop-shadow(0 16px 20px rgba(80,60,30,.2));">{{ c.emoji }}</div>
          </sc-if>
        </div>
        <div style="margin-top:8px;display:flex;justify-content:center;">
          <div style="position:relative;background:{{ c.bubbleBg }};border-radius:100px;padding:13px 26px;font-size:17px;font-weight:700;color:{{ c.body }};line-height:1.5;text-align:center;text-wrap:pretty;white-space:pre-line;box-shadow:0 4px 14px rgba(80,60,30,.1);">
            <div style="position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;background:{{ c.bubbleBg }};"></div>
            <div style="position:absolute;top:-24px;left:calc(50% - 11px);width:6px;height:6px;border-radius:50%;background:{{ c.bubbleBg }};"></div>
            {{ c.quote }}
          </div>
        </div>
      </div>

      <div style="height:8px;"></div>

      <div style="display:flex;padding:12px 0;">
        <div style="width:96px;font-size:14px;font-weight:600;color:{{ c.faint }};flex-shrink:0;">시그니처 브랜드</div>
        <div style="flex:1;font-size:14px;font-weight:800;color:{{ c.body }};text-align:right;">{{ c.brands }}</div>
      </div>
      <div style="display:flex;align-items:center;padding:12px 0;border-top:1px solid {{ c.line }};">
        <div style="width:96px;font-size:14px;font-weight:600;color:{{ c.faint }};flex-shrink:0;">컬러 팔레트</div>
        <div style="flex:1;display:flex;justify-content:flex-end;gap:6px;">
          <sc-for list="{{ c.swatches }}" as="sw" hint-placeholder-count="3">
            <div style="width:22px;height:22px;border-radius:6px;background:{{ sw.hex }};border:1px solid rgba(90,70,40,.2);"></div>
          </sc-for>
        </div>
      </div>
      <div style="display:flex;padding:12px 0;border-top:1px solid {{ c.line }};">
        <div style="width:96px;font-size:14px;font-weight:600;color:{{ c.faint }};flex-shrink:0;">MBTI</div>
        <div style="flex:1;font-size:14.5px;font-weight:800;color:{{ c.body }};text-align:right;">{{ c.mbti }}</div>
      </div>
      <div style="display:flex;align-items:center;padding:12px 0;border-top:1px solid {{ c.line }};">
        <div style="width:96px;font-size:14px;font-weight:600;color:{{ c.faint }};flex-shrink:0;">희소도</div>
        <div style="flex:1;display:flex;justify-content:flex-end;">
          <span style="background:{{ c.ink }};color:{{ c.rarityTxt }};font-size:13px;font-weight:800;letter-spacing:.02em;padding:6px 14px;border-radius:100px;">{{ c.rarity }}</span>
        </div>
      </div>

      <div style="margin-top:14px;padding:15px 16px;background:{{ c.secBg }};border-radius:16px;">
        <div style="font-size:10px;letter-spacing:.06em;color:{{ c.ink }};font-weight:800;margin-bottom:7px;">✦ {{ c.secLabel }}</div>
        <p style="font-size:13.5px;line-height:1.55;margin:0;font-weight:700;color:{{ c.body }};text-wrap:pretty;">{{ c.secText }}</p>
      </div>

      <!-- recommend items (themed) -->
      <div style="margin-top:16px;">
        <div style="font-size:10px;letter-spacing:.06em;color:{{ c.ink }};font-weight:800;margin-bottom:4px;">✦ 추천 아이템</div>
        <sc-for list="{{ c.items }}" as="it" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid {{ c.line }};">
            <div style="width:40px;height:40px;border-radius:12px;background:{{ c.secBg }};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">{{ it.e }}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:800;color:{{ c.body }};">{{ it.t }}</div>
              <div style="font-size:11.5px;font-weight:600;color:{{ c.faint }};margin-top:2px;">{{ it.s }}</div>
            </div>
            <div style="font-size:12px;color:{{ c.faint }};font-weight:700;flex-shrink:0;">자세히 ›</div>
          </div>
        </sc-for>
      </div>

      <div style="display:flex;align-items:center;justify-content:center;gap:11px;margin-top:18px;padding-top:16px;border-top:1px solid {{ c.line }};">
        <img src="fedit_logo.png" alt="FEDIT" style="height:16px;width:auto;display:block;filter:brightness(0) invert(1);opacity:.95;"/>
      </div>
    </div>
  </div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:400,&quot;height&quot;:760}}"></script>
</body>
</html>
